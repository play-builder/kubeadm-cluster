# ch06 Lab — nginx Deployment + Service
# Create ClusterIP / NodePort Services to observe iptables DNAT rules
apiVersion: apps/v1
kind: Deployment
metadata:
  name: net-nginx
  labels:
    app: net-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: net-nginx
  template:
    metadata:
      labels:
        app: net-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: net-svc
spec:
  type: ClusterIP
  selector:
    app: net-nginx
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: net-svc-np
spec:
  type: NodePort
  selector:
    app: net-nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
