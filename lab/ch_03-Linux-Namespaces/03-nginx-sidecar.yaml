apiVersion: v1
kind: Pod
metadata:
  name: ns-demo
spec:
  containers:
  - name: nginx
    image: nginx:1.27
    ports:
    - containerPort: 80
  - name: log-collector
    image: busybox:1.36
    command: ["sh", "-c", "while true; do echo \"[log] $(date) nginx access\" >> /tmp/app.log; sleep 5; done"]
